; PHP custom config para PINCA
; Optimizaciones para performance del container.
; En DEV mantenemos validate_timestamps=1 para que cambios de código se vean
; sin reiniciar; en PROD bajar a 0 para máxima performance.

; ─── Opcache ─────────────────────────────────────────────────────────────────
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=256
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000
opcache.revalidate_freq=60      ; revalida cada 60s, no cada request — clave con bind mount NTFS
opcache.validate_timestamps=1   ; PROD: 0 — DEV: 1 (detecta cambios de código)
opcache.fast_shutdown=1
opcache.save_comments=1         ; CI4 usa annotations en algunos lugares

; ─── JIT (PHP 8 trace JIT) ───────────────────────────────────────────────────
opcache.jit=tracing
opcache.jit_buffer_size=128M

; ─── Realpath cache (acelera autoload) ───────────────────────────────────────
realpath_cache_size=4M
realpath_cache_ttl=600

; ─── Memoria & ejecución ─────────────────────────────────────────────────────
memory_limit=256M
max_execution_time=60
max_input_time=60
post_max_size=32M
upload_max_filesize=32M

; ─── Fecha & errores ─────────────────────────────────────────────────────────
date.timezone=America/Bogota
display_errors=Off              ; PROD: Off (ya estaba). DEV: On si necesitás debug
log_errors=On
