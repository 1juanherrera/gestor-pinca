openapi: 3.0.3
info:
  title: PINCA API
  version: '1.0'
  description: |
    REST API del sistema PINCA (gestión de manufactura y compras).
    Todas las respuestas son JSON. Todas las rutas viven bajo `/api` y exigen
    `Authorization: Bearer <JWT>` salvo las marcadas como públicas
    (`/api/login`, `/api/crear`, `/api/auth/refresh`, `/api/health`).

    **Notas de uso**
    - JWT por defecto dura `8h` (configurable en `configuracion_sistema.jwt_expiracion_horas`).
    - `POST /api/login` devuelve también `refresh_token` (TTL 7 días) que rota en cada `/auth/refresh`.
    - Los listados respetan `deleted_at IS NULL` por default (soft-delete activo en entidades críticas).
    - Códigos de error: `200 ok` siempre con `{ok, msg, ...}`, `401` sin token / inválido,
      `403` rol insuficiente, `422` validación de payload, `409` conflicto de estado, `500` interno.
servers:
  - url: http://localhost:8080
    description: Dev local (docker-compose)
  - url: /
    description: Same-origin
tags:
  - name: Auth
    description: Login, refresh, logout, password.
  - name: Catálogo
    description: Maestro de ítems (item_general).
  - name: Inventario
    description: Lectura de stock global, capas de costo, ajustes y traspasos.
  - name: Compras
    description: Órdenes de compra, recepciones, requisiciones, prorrateos.
  - name: Ventas
    description: Cotizaciones, facturas, remisiones, pagos, notas crédito.
  - name: Producción
    description: Formulaciones, preparaciones, costos de producción.
  - name: Reportes
    description: Dashboard, cartera, trazabilidad, sincronización, búsqueda.
  - name: Sistema
    description: Salud, configuración, numeración, auditoría, roles, empresa, usuarios.

security:
  - bearerAuth: []

paths:
  # ─────────────────────────── AUTH ───────────────────────────
  /api/health:
    get:
      tags: [Sistema]
      security: []
      summary: Health check (público)
      description: Devuelve 200 si el backend y la DB responden, 503 si la DB está caída.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Health' }
        '503':
          description: DB caída
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Health' }

  /api/login:
    post:
      tags: [Auth]
      security: []
      summary: Login con username + password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string, example: jperez }
                password: { type: string, format: password, example: secret123 }
      responses:
        '200':
          description: Resultado (ok=true al éxito, ok=false al fallo de credenciales)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LoginResponse' }
        '429':
          description: Rate limit (5 intentos / 15 min / IP)
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }

  /api/crear:
    post:
      tags: [Auth]
      security: []
      summary: Crear usuario (registro público — sujeto a confirmación)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, nombre]
              properties:
                username: { type: string, minLength: 3 }
                password: { type: string, format: password, minLength: 8 }
                nombre:   { type: string }
                rol:      { type: string, enum: [admin, operador, visor] }
      responses:
        '200': { description: Usuario creado, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }
        '422': { description: Validación falló, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  /api/auth/refresh:
    post:
      tags: [Auth]
      security: []
      summary: Rotar refresh_token y emitir JWT nuevo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string, example: a1b2c3... }
      responses:
        '200':
          description: Tokens nuevos
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:           { type: boolean, example: true }
                  token:        { type: string }
                  refresh_token: { type: string }
        '401':
          description: refresh inválido / expirado / revocado
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Usuario actual (fresco de BD)
      responses:
        '200':
          description: Usuario
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:      { type: boolean }
                  usuario: { $ref: '#/components/schemas/Usuario' }
        '401':
          description: No autenticado
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout server-side (revoca refresh + bumpea token_version)
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }

  /api/usuarios/mi-password:
    patch:
      tags: [Auth]
      summary: Cambiar password del usuario actual
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password_actual, password_nueva]
              properties:
                password_actual: { type: string, format: password }
                password_nueva:  { type: string, format: password, minLength: 8 }
      responses:
        '200':
          description: Password actualizada (devuelve JWT nuevo)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:    { type: boolean }
                  msg:   { type: string }
                  token: { type: string }

  # ─────────────────────────── CATÁLOGO ───────────────────────────
  /api/catalogo:
    get:
      tags: [Catálogo]
      summary: Lista ítems con stock total y conteo de proveedores
      parameters:
        - { name: tipo,         in: query, schema: { type: integer, enum: [0,1,2] }, description: '0=Producto, 1=Materia Prima, 2=Insumo' }
        - { name: categoria_id, in: query, schema: { type: integer } }
        - { name: q,            in: query, schema: { type: string },  description: Búsqueda libre por nombre/código }
      responses:
        '200':
          description: Listado
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/CatalogoItem' }
    post:
      tags: [Catálogo]
      summary: Crear ítem (NO ingresa inventario — el stock entra solo por OC)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CatalogoItemInput' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }

  /api/catalogo/{id}:
    get:
      tags: [Catálogo]
      summary: Detalle de ítem (proveedores + stock por bodega)
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: Detalle
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CatalogoItemDetalle' }
        '404': { description: No encontrado, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    put:
      tags: [Catálogo]
      summary: Actualizar atributos del ítem
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CatalogoItemInput' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }
    delete:
      tags: [Catálogo]
      summary: Soft-delete del ítem (409 si tiene stock activo)
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }
        '409': { description: Item con stock activo, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  /api/catalogo/{id}/proveedores:
    get:
      tags: [Catálogo]
      summary: Proveedores vinculados al ítem
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: Lista
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ItemProveedor' }

  # ─────────────────────────── INVENTARIO ───────────────────────────
  /api/inventario/global:
    get:
      tags: [Inventario]
      summary: Stock consolidado por ítem / bodega (vista read-only)
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { type: object } } } } }

  /api/inventario/{id}/capas:
    get:
      tags: [Inventario]
      summary: Capas de costo activas para un ítem
      parameters:
        - { name: id,         in: path, required: true, schema: { type: integer } }
        - { name: bodega_id,  in: query, schema: { type: integer } }
      responses:
        '200':
          description: Lista de capas
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Capa' } }

  /api/inventario/traspaso:
    post:
      tags: [Inventario]
      summary: Traspasar stock entre bodegas (FIFO desde origen)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [item_general_id, bodega_origen_id, bodega_destino_id, cantidad]
              properties:
                item_general_id:   { type: integer }
                bodega_origen_id:  { type: integer }
                bodega_destino_id: { type: integer }
                cantidad:          { type: number, format: float }
                motivo:            { type: string }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }

  /api/inventario/ajuste-manual:
    post:
      tags: [Inventario]
      summary: Ajuste manual de stock (rotura, derrame, conteo, vencimiento, otro)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [item_general_id, bodega_id, cantidad, motivo]
              properties:
                item_general_id: { type: integer }
                bodega_id:       { type: integer }
                cantidad:        { type: number, format: float, description: Cantidad a descontar (positiva) }
                motivo:          { type: string, enum: [rotura, derrame, conteo, vencimiento, otro] }
                observacion:     { type: string }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }

  # ─────────────────────────── COMPRAS — OC ───────────────────────────
  /api/ordenes_compra:
    get:
      tags: [Compras]
      summary: Lista de OCs (incluye iva_pct + iva_monto + total_con_iva)
      parameters:
        - { name: estado,       in: query, schema: { type: integer }, description: '0=Borrador, 1=Enviada, 2=Recibida, 3=Cancelada' }
        - { name: proveedor_id, in: query, schema: { type: integer } }
        - { name: desde,        in: query, schema: { type: string, format: date } }
        - { name: hasta,        in: query, schema: { type: string, format: date } }
      responses:
        '200':
          description: Lista
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/OrdenCompra' } }
    post:
      tags: [Compras]
      summary: Crear OC nueva
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [proveedor_id, items]
              properties:
                proveedor_id: { type: integer }
                fecha:        { type: string, format: date }
                iva_pct:      { type: number, format: float, description: Override de iva_default }
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      item_proveedor_id: { type: integer }
                      cantidad:          { type: number, format: float }
                      precio_unitario:   { type: number, format: float }
      responses:
        '200': { description: OC creada, content: { application/json: { schema: { type: object, properties: { ok: { type: boolean }, id_orden: { type: integer } } } } } }
        '422': { description: Validación, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  /api/ordenes_compra/{id}/detalle:
    get:
      tags: [Compras]
      summary: Detalle de OC (cabecera + líneas con factor_conversion + unidad_compra/base)
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '200': { description: Detalle, content: { application/json: { schema: { type: object } } } }

  /api/ordenes_compra/{id}/recibir/{idDetalle}:
    post:
      tags: [Compras]
      summary: Recibir una línea individual de OC (crea capa + recalcula promedio)
      parameters:
        - { name: id,        in: path, required: true, schema: { type: integer } }
        - { name: idDetalle, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cantidad_recibida]
              properties:
                cantidad_recibida: { type: number, format: float, minimum: 0 }
                lote_proveedor:    { type: string, maxLength: 100 }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }
        '422': { description: Validación, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  /api/ordenes_compra/{id}/recibir-prorrateado:
    post:
      tags: [Compras]
      summary: Recibir varias líneas en un mismo lote con precio total negociado
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [precio_total_pagado, lineas]
              properties:
                precio_total_pagado: { type: number, format: float, minimum: 0 }
                lote_proveedor:      { type: string }
                lineas:
                  type: array
                  items:
                    type: object
                    properties:
                      id_detalle:        { type: integer }
                      cantidad_recibida: { type: number, format: float }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }

  /api/ordenes_compra/{id}/lote-sugerido:
    get:
      tags: [Compras]
      summary: Código de lote sugerido para esta OC (reusa el existente si hay)
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: Lote
          content:
            application/json:
              schema:
                type: object
                properties:
                  lote: { type: string, example: LOT-OC42-20260529 }

  # ─────────────────────────── PRODUCCIÓN ───────────────────────────
  /api/formulaciones:
    get:
      tags: [Producción]
      summary: Listar fórmulas
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { type: object } } } } }
    post:
      tags: [Producción]
      summary: Crear fórmula
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                item_general_id: { type: integer }
                ingredientes:
                  type: array
                  items:
                    type: object
                    properties:
                      materia_prima_id: { type: integer }
                      cantidad:         { type: number, format: float }
                      porcentaje:       { type: number, format: float }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }
        '422': { description: Suma % ≠ 100 / FK inválida, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  /api/formulaciones/{id}/opciones-ingredientes:
    get:
      tags: [Producción]
      summary: Por ingrediente, opciones de proveedor ordenadas por precio/kg ASC
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: Opciones por ingrediente
          content:
            application/json:
              schema:
                type: object
                properties:
                  item:    { type: object }
                  materias:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        opciones:
                          type: array
                          items: { type: object }

  /api/formulaciones/clonar:
    post:
      tags: [Producción]
      summary: Clonar fórmula de un producto a otro
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [from_item_id, to_item_id]
              properties:
                from_item_id: { type: integer }
                to_item_id:   { type: integer }
                nombre:       { type: string }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }
        '422': { description: from == to o inválido, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  /api/preparaciones:
    get:
      tags: [Producción]
      summary: Lista de órdenes de producción
      parameters:
        - { name: estado,   in: query, schema: { type: integer, enum: [0,1,2,3] }, description: '0=Pendiente, 1=EnProceso, 2=Completada, 3=Cancelada' }
        - { name: page,     in: query, schema: { type: integer } }
        - { name: per_page, in: query, schema: { type: integer, maximum: 200 } }
      responses:
        '200': { description: Listado paginado, content: { application/json: { schema: { type: object } } } }
    post:
      tags: [Producción]
      summary: Crear preparación (consume capas FIFO o por proveedor)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                item_general_id: { type: integer }
                cantidad:        { type: number, format: float }
                detalle:
                  type: array
                  items:
                    type: object
                    properties:
                      materia_prima_id: { type: integer }
                      cantidad:         { type: number, format: float }
                      proveedor_id:     { type: integer, description: Opcional — fuerza cascada por proveedor }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }
        '422': { description: Stock insuficiente o validación, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  # ─────────────────────────── SISTEMA ───────────────────────────
  /api/salud-sistema:
    get:
      tags: [Sistema]
      summary: Dashboard de salud (cobertura proveedores, OCs retrasadas, mora, etc.)
      responses:
        '200':
          description: Métricas
          content:
            application/json:
              schema:
                type: object
                properties:
                  score:           { type: integer, minimum: 0, maximum: 100 }
                  issues_activos:  { type: integer }
                  total_checks:    { type: integer }
                  cobertura:       { type: object }

  /api/costos-produccion:
    get:
      tags: [Producción]
      summary: Costo real + tandas posibles por producto
      responses:
        '200': { description: Lista, content: { application/json: { schema: { type: array, items: { type: object } } } } }

  /api/configuracion:
    get:
      tags: [Sistema]
      summary: Todas las claves de configuración agrupadas
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object } } } }

  /api/dashboard:
    get:
      tags: [Reportes]
      summary: KPIs consolidados (ventas, compras, cartera, OCs, stock)
      responses:
        '200': { description: KPIs, content: { application/json: { schema: { type: object } } } }

  /api/search:
    get:
      tags: [Reportes]
      summary: Búsqueda global (items, clientes, proveedores, docs)
      parameters:
        - { name: q,     in: query, required: true, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, default: 5 } }
      responses:
        '200':
          description: Resultados
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    tipo:     { type: string }
                    id:       { type: integer }
                    label:    { type: string }
                    sublabel: { type: string }
                    path:     { type: string }

  # ─────────────────────────── VENTAS ───────────────────────────
  /api/facturas:
    get:
      tags: [Ventas]
      summary: Listar facturas
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { type: object } } } } }
    post:
      tags: [Ventas]
      summary: Crear factura
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cliente_id, items]
              properties:
                cliente_id: { type: integer }
                fecha:      { type: string, format: date }
                items:      { type: array, items: { type: object } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }

  /api/facturas/{id}/estado:
    patch:
      tags: [Ventas]
      summary: Cambiar estado de la factura (atómico, reversa pagos al anular)
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [estado]
              properties:
                estado: { type: string, enum: [Pagada, Parcial, Vencida, Anulada] }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }

  /api/cotizaciones:
    get:
      tags: [Ventas]
      summary: Listar cotizaciones
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { type: object } } } } }
    post:
      tags: [Ventas]
      summary: Crear cotización (cliente_id ó cliente_libre)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cliente_id:    { type: integer }
                cliente_libre: { type: string }
                fecha:         { type: string, format: date }
                validez_dias:  { type: integer }
                items:         { type: array, items: { type: object } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }

  /api/cotizaciones/{id}/convertir:
    post:
      tags: [Ventas]
      summary: Convertir cotización a factura
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }

  /api/remisiones:
    get:
      tags: [Ventas]
      summary: Listar remisiones
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { type: object } } } } }
    post:
      tags: [Ventas]
      summary: Crear remisión (descuenta stock al confirmar)
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }

  /api/pagos_cliente:
    post:
      tags: [Ventas]
      summary: Registrar pago de cliente (recalcula saldo de factura)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [facturas_id, monto, fecha_pago, metodo_pago]
              properties:
                facturas_id: { type: integer }
                monto:       { type: number, format: float, minimum: 0 }
                fecha_pago:  { type: string, format: date }
                metodo_pago: { type: string }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }

  /api/notas_credito:
    post:
      tags: [Ventas]
      summary: Crear nota crédito (afecta saldo de factura)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [facturas_id, monto]
              properties:
                facturas_id: { type: integer }
                monto:       { type: number, format: float, minimum: 0 }
                motivo:      { type: string, maxLength: 255 }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }

  # ─────────────────────────── REQUISICIONES ───────────────────────────
  /api/requisiciones:
    get:
      tags: [Compras]
      summary: Listar requisiciones de compra
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { type: object } } } } }
    post:
      tags: [Compras]
      summary: Crear requisiciones en batch (con validación de FKs)
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }

  /api/requisiciones/convertir-oc:
    post:
      tags: [Compras]
      summary: Agrupar requisiciones por proveedor y emitir OCs
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }

  # ─────────────────────────── REPORTES ───────────────────────────
  /api/trazabilidad/lotes:
    get:
      tags: [Reportes]
      summary: Buscar lotes por código
      parameters:
        - { name: q, in: query, schema: { type: string } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { type: object } } } } }

  /api/trazabilidad/preparacion/{id}:
    get:
      tags: [Reportes]
      summary: Hoja de trazabilidad para una producción
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object } } } }

  /api/cartera/aging:
    get:
      tags: [Reportes]
      summary: Aging de cartera por cliente
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: array, items: { type: object } } } } }

  /api/sincronizacion/stats:
    get:
      tags: [Reportes]
      summary: KPIs de catálogo ↔ proveedores
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object } } } }

  /api/movimientos:
    get:
      tags: [Inventario]
      summary: Audit log de movimientos de inventario
      parameters:
        - { name: item_general_id, in: query, schema: { type: integer } }
        - { name: bodega_id,       in: query, schema: { type: integer } }
        - { name: tipo,            in: query, schema: { type: string,  enum: [ENTRADA, SALIDA, TRASPASO, AJUSTE] } }
        - { name: responsable,     in: query, schema: { type: string } }
        - { name: page,            in: query, schema: { type: integer } }
        - { name: per_page,        in: query, schema: { type: integer, maximum: 200 } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object } } } }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Header: `Authorization: Bearer <token>`.
        El JWT expira en 8h (override por `Cfg::n('jwt_expiracion_horas')`).
        Si querés mantener sesión más larga, rotá con `POST /api/auth/refresh`.

  schemas:
    Error:
      type: object
      properties:
        ok:     { type: boolean, example: false }
        msg:    { type: string,  example: 'Mensaje de error' }
        errors:
          type: object
          additionalProperties: { type: string }
          description: Detalle por campo (solo en 422 de validación)

    Success:
      type: object
      properties:
        ok:  { type: boolean, example: true }
        msg: { type: string,  example: 'Operación exitosa' }

    Health:
      type: object
      properties:
        ok:        { type: boolean, example: true }
        status:    { type: string, enum: [ok, degraded] }
        db:        { type: boolean }
        timestamp: { type: integer }
        version:   { type: string, example: '1.0' }

    Usuario:
      type: object
      properties:
        id:                    { type: integer }
        username:              { type: string }
        nombre:                { type: string }
        rol:                   { type: string, enum: [superadmin, admin, operador, visor] }
        modulos:               { type: array,  items: { type: string } }
        password_must_change:  { type: integer, enum: [0, 1] }

    LoginResponse:
      type: object
      properties:
        ok:            { type: boolean }
        msg:           { type: string }
        token:         { type: string, description: JWT (8h por default) }
        refresh_token: { type: string, description: Refresh token (7d) }
        usuario:       { $ref: '#/components/schemas/Usuario' }

    CatalogoItem:
      type: object
      properties:
        id_item_general:    { type: integer }
        nombre:             { type: string }
        codigo:             { type: string }
        tipo:               { type: integer, enum: [0, 1, 2] }
        categoria_id:       { type: integer, nullable: true }
        unidad_id:          { type: integer, nullable: true }
        costo_unitario:     { type: number,  format: float }
        stock_total:        { type: number,  format: float }
        total_proveedores:  { type: integer }

    CatalogoItemInput:
      type: object
      required: [nombre, tipo]
      properties:
        nombre:                { type: string,  maxLength: 100 }
        codigo:                { type: string }
        tipo:                  { type: integer, enum: [0, 1, 2] }
        categoria_id:          { type: integer }
        unidad_id:             { type: integer }
        unidad_almacenaje_id:  { type: integer }
        descripcion:           { type: string }

    CatalogoItemDetalle:
      allOf:
        - $ref: '#/components/schemas/CatalogoItem'
        - type: object
          properties:
            proveedores:
              type: array
              items: { $ref: '#/components/schemas/ItemProveedor' }
            stock_por_bodega:
              type: array
              items:
                type: object
                properties:
                  bodega_id:   { type: integer }
                  nombre:      { type: string }
                  cantidad:    { type: number, format: float }

    ItemProveedor:
      type: object
      properties:
        id_item_proveedor:   { type: integer }
        item_general_id:     { type: integer, nullable: true }
        proveedor_id:        { type: integer }
        nombre:              { type: string }
        precio_unitario:     { type: number, format: float }
        unidad_compra_id:    { type: integer }
        factor_conversion:   { type: number, format: float }

    OrdenCompra:
      type: object
      properties:
        id_orden:         { type: integer }
        numero:           { type: string,  example: OC-022 }
        proveedor_id:     { type: integer }
        proveedor_nombre: { type: string }
        fecha:            { type: string,  format: date }
        estado:           { type: integer, enum: [0, 1, 2, 3], description: '0=Borrador, 1=Enviada, 2=Recibida, 3=Cancelada' }
        total:            { type: number,  format: float, description: Subtotal sin IVA }
        iva_pct:          { type: number,  format: float, nullable: true }
        iva_monto:        { type: number,  format: float }
        total_con_iva:    { type: number,  format: float }

    Capa:
      type: object
      properties:
        id_capa:              { type: integer }
        item_general_id:      { type: integer }
        bodega_id:            { type: integer }
        proveedor_id:         { type: integer }
        lote_proveedor:       { type: string, nullable: true }
        orden_compra_id:      { type: integer, nullable: true }
        cantidad_original:    { type: number, format: float }
        cantidad_disponible:  { type: number, format: float }
        costo_unitario:       { type: number, format: float }
        fecha_ingreso:        { type: string, format: date-time }
        estado:               { type: string, enum: [activa, agotada] }
