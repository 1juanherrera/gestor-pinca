<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PINCA API — Swagger UI</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
  <link rel="icon" href="/favicon.ico">
  <style>
    html, body { margin: 0; padding: 0; background: #fafafa; }
    .topbar { display: none; }
    #header {
      padding: 16px 24px;
      background: #1a202c;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #header h1 { margin: 0 0 4px; font-size: 20px; font-weight: 600; }
    #header p  { margin: 0; font-size: 13px; opacity: 0.7; }
  </style>
</head>
<body>
  <div id="header">
    <h1>PINCA API</h1>
    <p>Documentación de endpoints — generada desde <code>/openapi.yaml</code></p>
  </div>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
  <script>
    window.addEventListener('load', () => {
      window.ui = SwaggerUIBundle({
        url: '/openapi.yaml',
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset.slice(1) // sin topbar
        ],
        layout: 'BaseLayout',
        tryItOutEnabled: true,
        persistAuthorization: true,
        docExpansion: 'list',
        defaultModelsExpandDepth: 1,
        filter: true,
      });
    });
  </script>
</body>
</html>
